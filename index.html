<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rithvik | Student Developer</title>
  <meta name="description" content="Student developer focused on Git, Linux, and systems learning through small practical projects." />
  <style>
    :root {
      --bg: #0b0f19;
      --bg-soft: #121827;
      --card: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.1);
      --text: #edf2f7;
      --muted: #9aa4b2;
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 20px;
      --max: 1100px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(92%, var(--max));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(11, 15, 25, 0.75);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
    }

    .brand {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .hero {
      padding: 88px 0 56px;
    }

    .hero-wrap {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: stretch;
    }

    .hero-main,
    .hero-side,
    .card,
    .project,
    .note {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px var(--accent);
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      max-width: 10ch;
      margin-bottom: 18px;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 62ch;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b0f19;
      border: none;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .hero-side {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
    }

    .stat {
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .stat:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat strong {
      font-size: 1.1rem;
      display: block;
      margin-bottom: 6px;
    }

    section {
      padding: 28px 0 56px;
    }

    .section-head {
      margin-bottom: 22px;
    }

    .section-kicker {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .section-head h2 {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .section-head p {
      color: var(--muted);
      max-width: 70ch;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .card {
      padding: 24px;
    }

    .card h3,
    .project h3,
    .note h3 {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .card p,
    .project p,
    .note p,
    li {
      color: var(--muted);
    }

    .project {
      padding: 26px;
    }

    .project-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.85rem;
      color: #cbd5e1;
