<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vibe Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
      background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc, #ff6600);
      background-size: 800% 800%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.4);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255,255,255,0.2);
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #fff, #ff0, #0ff, #f0f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 25px #ff00ff; }
    }

    p {
      margin-top: 15px;
      font-size: 1.2rem;
      opacity: 0.9;
    }

    button {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff00cc, #00ffff);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255,255,255,0.9);
    }

    /* floating bubbles */
    .bubble {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: rise 10s infinite ease-in;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.5;
      }
      100% {
        transform: translateY(-120vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Welcome to My Page</h1>
    <p>This background is absolutely unhinged.</p>
    <button onclick="alert('You clicked the vibe button 😎')">Click Me</button>
  </div>

  <!-- bubbles -->
  <div class="bubble" style="left:10%; animation-duration:8s;"></div>
  <div class="bubble" style="left:30%; animation-duration:12s;"></div>
  <div class="bubble" style="left:50%; animation-duration:10s;"></div>
  <div class="bubble" style="left:70%; animation-duration:14s;"></div>
  <div class="bubble" style="left:90%; animation-duration:9s;"></div>

</body>
</html>
